<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Notion Clock App</title>
<style>
  body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
  /* アプリ設定画面のスタイル */
  #app-ui { padding: 30px; background: #f7f9fc; height: 100vh; box-sizing: border-box; }
  .control { margin-bottom: 20px; font-weight: bold; }
  input[type="color"] { cursor: pointer; }
  input[type="number"] { width: 60px; padding: 5px; }
  button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
  button:hover { background: #1a252f; }
  #outputUrl { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; border: 1px solid #ccc; }
  
  /* 時計表示画面のスタイル */
  #clock-display { display: flex; align-items: center; justify-content: center; height: 100vh; font-weight: bold; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="app-ui">
  <h2>⏰ アイラ特製・Notion時計ジェネレーター</h2>
  <div class="control">背景色: <input type="color" id="bgColor" value="#ffffff"></div>
  <div class="control">文字色: <input type="color" id="textColor" value="#2c3e50"></div>
  <div class="control">文字サイズ (rem): <input type="number" id="fontSize" value="4" step="0.5"></div>
  <button onclick="generateURL()">Notion埋め込みURLを発行</button>
  <p>👇 生成されたURLをNotionで「/embed」として貼り付けてください</p>
  <input type="text" id="outputUrl" readonly>
</div>

<div id="clock-display" style="display: none;">00:00:00</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const isClockMode = params.get('mode') === 'clock';

  if (isClockMode) {
    // 埋め込みモード：アプリUIを消して時計だけを表示
    document.getElementById('app-ui').style.display = 'none';
    const clockDiv = document.getElementById('clock-display');
    clockDiv.style.display = 'flex';
    
    // パラメーターからレイアウトを適用
    document.body.style.backgroundColor = params.get('bg') || '#ffffff';
    clockDiv.style.color = params.get('text') || '#2c3e50';
    clockDiv.style.fontSize = (params.get('size') || '4') + 'rem';

    // 時計の動作
    function updateTime() {
      const now = new Date();
      clockDiv.textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
    }
    setInterval(updateTime, 1000);
    updateTime();
  }

  function generateURL() {
    const bg = document.getElementById('bgColor').value;
    const text = document.getElementById('textColor').value;
    const size = document.getElementById('fontSize').value;
    
    // 現在のアドレスにレイアウト情報をくっつけてURLを完成させる
    const baseUrl = window.location.href.split('?')[0];
    const newUrl = `${baseUrl}?mode=clock&bg=${encodeURIComponent(bg)}&text=${encodeURIComponent(text)}&size=${size}`;
    document.getElementById('outputUrl').value = newUrl;
  }
</script>
</body>
</html>
