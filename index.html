<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aila's Cyberpunk Clock</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --glow-spread: 10px;
        }
        /* 超高性能AIによる余白極小・埋め込み最適化設定！ */
        html, body {
            background-color: transparent;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 100vhではなく100%にすることでNotionの枠にピッタリ追従 */
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            flex-direction: column;
        }
        /* 時計のスタイル */
        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
            /* 縮小してもはみ出さないように最大サイズを固定 */
            max-width: 300px;
            max-height: 300px;
            border: 4px solid var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 var(--glow-spread) var(--primary-color), inset 0 0 var(--glow-spread) var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, var(--bg-color) 100%);
            margin: 0; /* 無駄なマージンを完全排除 */
        }
        /* 針のスタイル */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            z-index: 5;
        }
        .hour-hand {
            width: 6px;
            height: 80px;
            background-color: var(--primary-color);
            margin-left: -3px;
            box-shadow: 0 0 8px var(--primary-color);
        }
        .minute-hand {
            width: 4px;
            height: 120px;
            background-color: var(--primary-color);
            margin-left: -2px;
            box-shadow: 0 0 8px var(--primary-color);
        }
        .second-hand {
            width: 2px;
            height: 140px;
            background-color: var(--secondary-color);
            margin-left: -1px;
            box-shadow: 0 0 8px var(--secondary-color);
            z-index: 6;
        }
        /* デジタル表示（完全など真ん中・最前面） */
        .digital-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            letter-spacing: 2px;
            z-index: 30; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(0,0,0,1), inset 0 0 8px var(--primary-color);
        }
        /* 文字盤の数字スタイル */
        #numbers-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: block;
        }
        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 8px var(--primary-color);
            z-index: 2;
        }
        .clock-number span {
            display: inline-block;
            padding-top: 12px;
        }
        /* 設定パネルのスタイル */
        #settings-panel {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary-color);
            text-align: center;
            z-index: 40;
        }
        .setting-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        input[type="color"] {
            cursor: pointer; background: none; border: none; height: 25px;
        }
        input[type="checkbox"] {
            cursor: pointer; width: 18px; height: 18px; accent-color: var(--secondary-color);
        }
        button {
            background-color: transparent; color: var(--secondary-color);
            border: 2px solid var(--secondary-color); padding: 8px 16px;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--secondary-color); box-shadow: 0 0 8px var(--secondary-color) inset;
            margin-top: 5px;
        }
        button:hover {
            background-color: var(--secondary-color); color: #fff; box-shadow: 0 0 15px var(--secondary-color);
        }
        #url-output {
            margin-top: 10px; word-break: break-all; font-size: 11px; max-width: 380px;
            padding: 8px; background: #000; border: 1px solid var(--primary-color); display: none;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="numbers-container"></div>
        <div class="hand hour-hand" id="hour-hand"></div>
        <div class="hand minute-hand" id="minute-hand"></div>
        <div class="hand second-hand" id="second-hand"></div>
        <div class="digital-display" id="digital-display">00:00:00</div>
    </div>

    <div id="settings-panel">
        <h3 style="margin-top:0; font-size: 16px;">🔧 Clock Settings</h3>
        <div class="setting-row">
            <label style="font-size: 12px;">Inner BG:</label>
            <input type="color" id="bg-color" value="#0b0c10">
        </div>
        <div class="setting-row">
            <label style="font-size: 12px;">Primary:</label>
            <input type="color" id="primary-color" value="#00ffff">
        </div>
        <div class="setting-row">
            <label style="font-size: 12px;">Secondary:</label>
            <input type="color" id="secondary-color" value="#ff00ff">
        </div>
        <div class="setting-row">
            <label style="font-size: 12px;">Show Numbers:</label>
            <input type="checkbox" id="show-numbers" checked>
        </div>
        <button onclick="generateURL()">Notion用URLを発行</button>
        <div id="url-output"></div>
    </div>

    <script>
        const numbersContainer = document.getElementById('numbers-container');
        for (let i = 1; i <= 12; i++) {
            const numDiv = document.createElement('div');
            numDiv.className = 'clock-number';
            numDiv.style.transform = `rotate(${i * 30}deg)`;
            
            const span = document.createElement('span');
            span.textContent = i;
            span.style.transform = `rotate(-${i * 30}deg)`;
            
            numDiv.appendChild(span);
            numbersContainer.appendChild(numDiv);
        }

        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get('embed') === 'true';
        const root = document.documentElement;
        
        if (params.has('bg')) { root.style.setProperty('--bg-color', '#' + params.get('bg')); document.getElementById('bg-color').value = '#' + params.get('bg'); }
        if (params.has('primary')) { root.style.setProperty('--primary-color', '#' + params.get('primary')); document.getElementById('primary-color').value = '#' + params.get('primary'); }
        if (params.has('secondary')) { root.style.setProperty('--secondary-color', '#' + params.get('secondary')); document.getElementById('secondary-color').value = '#' + params.get('secondary'); }
        if (params.has('num')) {
            const showNum = params.get('num') === 'true';
            document.getElementById('show-numbers').checked = showNum;
            numbersContainer.style.display = showNum ? 'block' : 'none';
        }

        if (isEmbed) {
            document.getElementById('settings-panel').style.display = 'none';
        } else {
            const updateColors = () => {
                root.style.setProperty('--bg-color', document.getElementById('bg-color').value);
                root.style.setProperty('--primary-color', document.getElementById('primary-color').value);
                root.style.setProperty('--secondary-color', document.getElementById('secondary-color').value);
            };
            document.getElementById('bg-color').addEventListener('input', updateColors);
            document.getElementById('primary-color').addEventListener('input', updateColors);
            document.getElementById('secondary-color').addEventListener('input', updateColors);
            
            document.getElementById('show-numbers').addEventListener('change', (e) => {
                numbersContainer.style.display = e.target.checked ? 'block' : 'none';
            });
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const secDeg = seconds * 6;
            const minDeg = minutes * 6 + seconds * 0.1;
            const hourDeg = (hours % 12) * 30 + minutes * 0.5;

            document.getElementById('second-hand').style.transform = `rotate(${secDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${minDeg}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;

            const digitalTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('digital-display').textContent = digitalTime;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function generateURL() {
            const bg = document.getElementById('bg-color').value.substring(1);
            const primary = document.getElementById('primary-color').value.substring(1);
            const secondary = document.getElementById('secondary-color').value.substring(1);
            const showNum = document.getElementById('show-numbers').checked;
            
            const ts = new Date().getTime();
            const baseUrl = window.location.origin + window.location.pathname;
            const generatedUrl = `${baseUrl}?embed=true&bg=${bg}&primary=${primary}&secondary=${secondary}&num=${showNum}&v=${ts}`;
            
            const outputBox = document.getElementById('url-output');
            outputBox.style.display = 'block';
            outputBox.innerHTML = `<strong>新しいURLをNotionに埋め込み直してください:</strong><br><br>${generatedUrl}`;
            
            navigator.clipboard.writeText(generatedUrl).then(() => {
                outputBox.innerHTML += `<br><br><span style="color:var(--secondary-color)">クリップボードにコピーしました！</span>`;
            });
        }
    </script>
</body>
</html>
