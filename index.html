<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aila's Cyberpunk Clock</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --glow-spread: 10px;
        }
        body {
            background-color: transparent;
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        /* 時計のスタイル */
        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 4px solid var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 var(--glow-spread) var(--primary-color), inset 0 0 var(--glow-spread) var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, var(--bg-color) 100%);
        }
        .center-dot {
            width: 12px;
            height: 12px;
            background-color: var(--secondary-color);
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 0 10px var(--secondary-color);
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 4px;
            z-index: 5;
        }
        .hour-hand {
            width: 6px;
            height: 80px;
            background-color: var(--primary-color);
            margin-left: -3px;
            box-shadow: 0 0 8px var(--primary-color);
        }
        .minute-hand {
            width: 4px;
            height: 120px;
            background-color: var(--primary-color);
            margin-left: -2px;
            box-shadow: 0 0 8px var(--primary-color);
        }
        .second-hand {
            width: 2px;
            height: 140px;
            background-color: var(--secondary-color);
            margin-left: -1px;
            box-shadow: 0 0 8px var(--secondary-color);
            z-index: 6;
        }
        /* デジタル表示を「ど真ん中」にし、針の上に配置！ */
        .digital-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 8px var(--primary-color);
            letter-spacing: 2px;
            z-index: 20; /* 針より前面に配置 */
            background: rgba(0, 0, 0, 0.85); /* 視認性を高める背景 */
            padding: 6px 15px;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        /* 文字盤の数字スタイル */
        #numbers-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: block;
        }
        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 8px var(--primary-color);
            z-index: 2;
        }
        .clock-number span {
            display: inline-block;
            padding-top: 15px;
        }
        /* 設定パネルのスタイル */
        #settings-panel {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary-color);
            text-align: center;
            z-index: 30;
        }
        .setting-row {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        input[type="color"] {
            cursor: pointer;
            background: none;
            border: none;
            height: 30px;
        }
        input[type="checkbox"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: var(--secondary-color);
        }
        button {
            background-color: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--secondary-color);
            box-shadow: 0 0 10px var(--secondary-color) inset;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--secondary-color);
            color: #fff;
            box-shadow: 0 0 20px var(--secondary-color);
        }
        #url-output {
            margin-top: 15px;
            word-break: break-all;
            font-size: 12px;
            max-width: 400px;
            padding: 10px;
            background: #000;
            border: 1px solid var(--primary-color);
            display: none;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="center-dot"></div>
        <div id="numbers-container"></div>
        <div class="hand hour-hand" id="hour-hand"></div>
        <div class="hand minute-hand" id="minute-hand"></div>
        <div class="hand second-hand" id="second-hand"></div>
        <div class="digital-display" id="digital-display">00:00:00</div>
    </div>

    <div id="settings-panel">
        <h3 style="margin-top:0;">🔧 Clock Settings</h3>
        <div class="setting-row">
            <label>Clock Inner BG:</label>
            <input type="color" id="bg-color" value="#0b0c10">
        </div>
        <div class="setting-row">
            <label>Primary (Neon):</label>
            <input type="color" id="primary-color" value="#00ffff">
        </div>
        <div class="setting-row">
            <label>Secondary (Accent):</label>
            <input type="color" id="secondary-color" value="#ff00ff">
        </div>
        <div class="setting-row">
            <label>Show Numbers:</label>
            <input type="checkbox" id="show-numbers" checked>
        </div>
        <button onclick="generateURL()">Notion用URLを発行</button>
        <div id="url-output"></div>
    </div>

    <script>
        // 数字の自動生成と配置
        const numbersContainer = document.getElementById('numbers-container');
        for (let i = 1; i <= 12; i++) {
            const numDiv = document.createElement('div');
            numDiv.className = 'clock-number';
            numDiv.style.transform = `rotate(${i * 30}deg)`;
            
            const span = document.createElement('span');
            span.textContent = i;
            span.style.transform = `rotate(-${i * 30}deg)`;
            
            numDiv.appendChild(span);
            numbersContainer.appendChild(numDiv);
        }

        // URLパラメータの取得と適用
        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get('embed') === 'true';
        
        const root = document.documentElement;
        if (params.has('bg')) {
            root.style.setProperty('--bg-color', '#' + params.get('bg'));
            document.getElementById('bg-color').value = '#' + params.get('bg');
        }
        if (params.has('primary')) {
            root.style.setProperty('--primary-color', '#' + params.get('primary'));
            document.getElementById('primary-color').value = '#' + params.get('primary');
        }
        if (params.has('secondary')) {
            root.style.setProperty('--secondary-color', '#' + params.get('secondary'));
            document.getElementById('secondary-color').value = '#' + params.get('secondary');
        }
        if (params.has('num')) {
            const showNum = params.get('num') === 'true';
            document.getElementById('show-numbers').checked = showNum;
            numbersContainer.style.display = showNum ? 'block' : 'none';
        }

        // Notion埋め込みモードなら設定パネルを隠す
        if (isEmbed) {
            document.getElementById('settings-panel').style.display = 'none';
        } else {
            // リアルタイムプレビュー
            const updateColors = () => {
                root.style.setProperty('--bg-color', document.getElementById('bg-color').value);
                root.style.setProperty('--primary-color', document.getElementById('primary-color').value);
                root.style.setProperty('--secondary-color', document.getElementById('secondary-color').value);
            };
            document.getElementById('bg-color').addEventListener('input', updateColors);
            document.getElementById('primary-color').addEventListener('input', updateColors);
            document.getElementById('secondary-color').addEventListener('input', updateColors);
            
            document.getElementById('show-numbers').addEventListener('change', (e) => {
                numbersContainer.style.display = e.target.checked ? 'block' : 'none';
            });
        }

        // 時計の更新処理
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const secDeg = seconds * 6;
            const minDeg = minutes * 6 + seconds * 0.1;
            const hourDeg = (hours % 12) * 30 + minutes * 0.5;

            document.getElementById('second-hand').style.transform = `rotate(${secDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${minDeg}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;

            const digitalTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('digital-display').textContent = digitalTime;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // URL発行機能
        function generateURL() {
            const bg = document.getElementById('bg-color').value.substring(1);
            const primary = document.getElementById('primary-color').value.substring(1);
            const secondary = document.getElementById('secondary-color').value.substring(1);
            const showNum = document.getElementById('show-numbers').checked;
            
            const baseUrl = window.location.origin + window.location.pathname;
            const generatedUrl = `${baseUrl}?embed=true&bg=${bg}&primary=${primary}&secondary=${secondary}&num=${showNum}`;
            
            const outputBox = document.getElementById('url-output');
            outputBox.style.display = 'block';
            outputBox.innerHTML = `<strong>コピーしてNotionに埋め込んでください:</strong><br><br>${generatedUrl}`;
            
            navigator.clipboard.writeText(generatedUrl).then(() => {
                outputBox.innerHTML += `<br><br><span style="color:var(--secondary-color)">クリップボードにコピーしました！</span>`;
            });
        }
    </script>
</body>
</html>
